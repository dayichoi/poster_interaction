<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster Hand Sparkle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <div id="posterFrame" class="poster-frame">
      <canvas id="baseCanvas" class="base-canvas"></canvas>
      <img
        id="posterImage"
        class="poster-image"
        src="./assets/poster.png"
        alt="국립공주대학교 졸업전시 포스터"
      >
      <canvas id="effectCanvas" class="effect-canvas"></canvas>
    </div>
  </main>

  <video id="inputVideo" class="input-video" playsinline muted></video>
  <canvas id="sampleCanvas" class="sample-canvas"></canvas>
  <p id="statusText" class="sr-only" aria-live="polite">포스터를 터치하면 카메라가 켜집니다.</p>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
